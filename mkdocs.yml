site_name: Provenir
site_description: Reproducible, evaluation-first orchestration for LLM fine-tuning
site_url: https://anilatambharii.github.io/provenir
repo_url: https://github.com/anilatambharii/provenir
repo_name: anilatambharii/provenir
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Installation: installation.md
  - Guides:
      - Core Concepts: concepts.md
      - Trust Layer: guides/trust-layer.md
      - Reward-Hacking & RL Observability: guides/trust-layer.md
      - RLAIF Pipeline: guides/rlaif.md
      - Data Flywheel: guides/flywheel.md
      - RAG Dataset Generation: guides/rag.md
      - Adapter Merging: guides/merging.md
      - Benchmarks: guides/benchmarks.md
      - Governance & Audit: guides/governance.md
  - API Reference: api.md
  - Changelog: changelog.md

