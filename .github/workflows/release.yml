name: Release to PyPI

# Triggers on every version tag: git tag v0.5.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  # ── 1. CI gate ─────────────────────────────────────────────────────────────
  # Run the full quality suite before touching PyPI.
  quality:
    name: Lint · Type · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,serve,hub,merge,semantic,judge-anthropic,judge-openai]"

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Type check (mypy)
        run: python -m mypy src

      - name: Tests (pytest)
        run: python -m pytest -q --tb=short

  # ── 2. Build distribution ──────────────────────────────────────────────────
  build:
    name: Build wheel + sdist
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Inspect dist/
        run: ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to PyPI ────────────────────────────────────────────────────
  # Uses PyPI Trusted Publishing (OIDC) — no API token stored in GitHub.
  #
  # One-time setup on pypi.org:
  #   1. Log in → Your Projects → provenir → Publishing
  #   2. Add a "pending publisher":
  #        Owner:    anilatambharii
  #        Repo:     provenir
  #        Workflow: release.yml
  #        Env:      pypi
  #
  # Alternatively set a PYPI_API_TOKEN repository secret and switch the
  # publish step to: password: ${{ secrets.PYPI_API_TOKEN }}
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted Publishing requires no extra configuration here.
        # Token fallback (comment out Trusted Publishing setup above):
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}

  # ── 4. GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
